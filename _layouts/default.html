<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
  body, main, p, h1, h2, h3, h4, h5, h6, ul, li {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
  }

  body {
    display: flex;
    margin: 0;
  }

  nav {
    width: 220px;
    background: #f0f0f0;
    padding: 1em;
    height: 100vh;
  }

  main {
    padding: 2em;
    flex-grow: 1;
    font-size: 0.8rem;
    line-height: 1.8;
  }

  a {
    display: block;
    margin: 0.5em 0;
    text-decoration: none;
    color: #333;    
  }
   a {
    white-space: nowrap;
  }
    a {
    color: #007bff; /* azul padrão */
    text-decoration: underline; /* opcional: sublinhado */
  }

  a:hover {
    color: #0056b3; /* azul mais escuro no hover */
  }
 p {
  white-space: pre-wrap; /* Mantém quebras manuais (de texto) */
  word-wrap: break-word; /* Permite quebrar palavras longas para evitar estouro */
  overflow-wrap: break-word; /* Compatibilidade extra: quebra palavras longas */
    
  }
  {% if page.permalink == '/publicacoes/' %}
  main p {
    margin-top: 0.5em;
    margin-bottom: 1em;
    margin-left: 2em; /* Aumenta a margem à esquerda */
    margin-right: 0;
  }
  {% endif %}
</style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="{{ '/' | relative_url }}"> Início</a></li>
      <li><a href="{{ '/mentorias' | relative_url }}"> Mentorias</a></li>
      <li><a href="{{ '/publicacoes' | relative_url }}"> Publicações</a></li>
      <li><a href="{{ '/aboutme' | relative_url }}"> About me</a></li>
    </ul>
  </nav>
  <main>
    {{ content }}
  </main>
</body>
</html>
